name: PR Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  pr-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests (Skipped for now)
        run: npm test

      - name: Build Project
        run: npm run build
